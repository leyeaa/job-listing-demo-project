name: Deploy Shared Hosting

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shared-hosting-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve base path
        env:
          VITE_APP_BASE_PATH: ${{ vars.VITE_APP_BASE_PATH }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          normalize_base_path() {
            local raw="$1"

            if [ -z "$raw" ]; then
              echo "/"
              return
            fi

            local trimmed
            trimmed="$(echo "$raw" | xargs)"

            if [ -z "$trimmed" ]; then
              echo "/"
              return
            fi

            if [[ "$trimmed" != /* ]]; then
              trimmed="/$trimmed"
            fi

            if [[ "$trimmed" != */ ]]; then
              trimmed="$trimmed/"
            fi

            echo "$trimmed"
          }

          derived_base_path=""
          if [ -n "$FTP_SERVER_DIR" ]; then
            clean_dir="${FTP_SERVER_DIR%/}"
            tail_dir="${clean_dir##*/}"

            case "$tail_dir" in
              ""|"public_html"|"www")
                derived_base_path="/"
                ;;
              *)
                derived_base_path="/$tail_dir/"
                ;;
            esac
          fi

          selected_base_path="$VITE_APP_BASE_PATH"
          if [ -z "$selected_base_path" ]; then
            selected_base_path="$derived_base_path"
          fi

          selected_base_path="$(normalize_base_path "$selected_base_path")"
          echo "Resolved base path: $selected_base_path"
          echo "DEPLOY_BASE_PATH=$selected_base_path" >> "$GITHUB_ENV"

      - name: Lint and build
        run: npm run check
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_BASE_PATH: ${{ env.DEPLOY_BASE_PATH }}

      - name: Deploy dist via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
